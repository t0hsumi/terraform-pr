name: Terraform Drift PR

on:
  schedule:
    - cron: '0 4 * * *' # 13:00 JST (UTC+9)
  workflow_dispatch:

concurrency:
  group: drift-detection
  cancel-in-progress: false

jobs:
  drift-detection:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.6"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: main
        run: terraform init

      - name: Terraform Plan
        id: plan
        working-directory: main
        run: |
          set +e
          terraform plan -detailed-exitcode -no-color 2>&1 | tee "$GITHUB_WORKSPACE/plan.txt"
          EXIT_CODE=${PIPESTATUS[0]}
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"

      - name: Exit on error
        if: steps.plan.outputs.exit_code == '1'
        run: |
          echo "terraform plan failed"
          cat plan.txt
          exit 1

      - name: No changes detected
        if: steps.plan.outputs.exit_code == '0'
        run: echo "No drift detected. Skipping PR creation."

      - name: Setup Python
        if: steps.plan.outputs.exit_code == '2'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        if: steps.plan.outputs.exit_code == '2'
        run: pip install anthropic

      - name: Create Drift PR
        if: steps.plan.outputs.exit_code == '2'
        env:
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/create_drift_pr.py
